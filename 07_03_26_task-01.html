<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Great Canyon Card</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #dcdcdc;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        width: 1000px;
        height: 600px;
        display: flex;
        background: #f5f5f5;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      

      .image-section {
        width: 40%;
        position: relative;
      }

      .image-section img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .est {
        position: absolute;
        top: 20px;
        left: 20px;
        background: #d2691e;
        color: white;
        font-size: 12px;
        padding: 6px 10px;
        font-weight: bold;
      }

      

      .content {
        width: 50%;
        padding: 70px;
        background: #f7f7f7;
      }

      .mark {
        display: inline-block;
        background: #cde8d5;
        color: #2c6e49;
        padding: 6px 14px;
        font-size: 14px;
        border-radius: 5px;
        margin-bottom: 20px;
      }

      .place {
        color: #d2691e;
        letter-spacing: 4px;
        font-weight: bold;
        font-size: 15px;
        margin-bottom: 10px;
      }

      .title {
        font-size: 55px;
        font-weight: 1000;
        color: #1d2733;
        line-height: 1.1;
        margin-bottom: 22px;
      }

      .line {
        height: 1px;
        background: #ddd;
        margin-bottom: 20px;
      }

      .quote {
        font-size: 18px;
        color: #555;
        line-height: 1.7;
        margin-bottom: 25px;
      }
      .quote span{
        color: gray;
        font-size: 25px;
        
      }

      .from {
        text-align: right;
        font-size: 13px;
        font-weight: bold;
        color: #333;
        margin-bottom: 25px;
        text-decoration: underline;
      }

      .buttons button {
        padding: 8px 14px;
        margin-right: 10px;
        border: 1px solid #ccc;
        background: white;
        cursor: pointer;
        font-weight: bold;
        font-size: 12px;
      }

      .buttons button:first-child {
        background: #1d2733;
        color: white;
        border: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="image-section">
        <img src="canyon image.png" />
        <div class="est">EST. 1994</div>
      </div>

      <div class="content">
        <div class="mark">&#10004; OFFICIAL EXPEDITION</div>

        <div class="place">NORTH AMERICA / UTAH</div>

        <div class="title">THE GREAT<br />CANYON</div>

        <div class="line"></div>

        <div class="quote">
          <span>&#34;</span>A vast landscape carved by time itself. This geological marvel offers
          more than just views; it offers a perspective on the sheer scale of
          our planet's history.
        </div>

        <div class="from"><b>GEO MAGAZINE</b></div>

        <div class="buttons">
          <button>ADVENTURE</button>
          <button>GEOLOGY</button>
          <button>HIKING</button>
        </div>
      </div>
    </div>
  </body>
</html>
