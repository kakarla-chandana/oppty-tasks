<!doctype html>
<html>
  <head>
    <title>Summer Harvest Bowl</title>
    <style>
      body {
        background: rgb(206, 225, 236);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial;
      }

       .card{
  width: 420px;
  background: white;
  box-shadow: 15px 15px 0 #a9d3d6;
}

      .image-box {
        position: relative;
        overflow: hidden;
      }

      .image-box img {
        width: 100%;
        display: block;
      }

      .ribbon {
        position: absolute;
        top: 20px;
        right: -38px;
        background: #e63946;
        color: white;
        padding: 8px 60px;
        transform: rotate(45deg);
        font-size: 12px;
        font-weight: bold;
        text-align: center;
      }

      .content {
        padding: 30px;
      }

      .tag {
        color: #c45c5c;
        font-size: 12px;
        letter-spacing: 2px;
        margin-bottom: 10px;
      }

      h1 {
        font-size: 36px;
        color: #243447;
        margin-bottom: 15px;
      }

      .mat {
        color: #16e4f3d5;
        line-height: 1.6;
        font-size: 14px;
      }

      hr {
        margin: 20px 0;
        border: 0.5px dashed #ccc;
      }

      .info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .people {
        font-size: 14px;
      }

      .time {
        border: 1px solid black;
        padding: 6px 12px;
        background: white;
        font-weight: bold;
      }

      .food-details {
        display: flex;
        justify-content: space-between;
        background: #eef3ef;
        padding: 15px;
        text-align: center;
      }

      .food-details h3 {
        margin: 0;
        color: #243447;
      }

      .food-details p {
        margin: 0;
        font-size: 12px;
        color: #777;
      }
      .food-details span{
        color: red;
      }
     
    </style>
  </head>

  <body>
    
    <div class="card">
      <div class="image-box">
        <img src="https://img.freepik.com/free-photo/salmon-poke-bowl-flat-lay-photography_53876-108183.jpg?semt=ais_rp_50_assets&w=740&q=80" />

        <div class="ribbon">CHEF'S PICK</div>
      </div>

      <div class="content">
        <p class="tag"><b>HEALTHY & ORGANIC</b></p>

        <h1><b><em>Summer<br />Harvest Bowl.</em></b></h1>

        <p class="mat">
          A vibrant assembly of garden-fresh greens, roasted seeds, and a zesty
          citrus vinaigrette. Perfect for light lunches or a sophisticated side.
        </p>

        <hr />

        <div class="info">
          <div class="people">&#127836; Serves 4 People</div>

          <button class="time">25 MIN PREP</button>
        </div>

        <div class="food-details">
          <div>
            <h3>320</h3>
            <p><span>CALORIES</span></p>
          </div>

          <div>
            <h3>12g</h3>
            <p>PROTEIN</p>
          </div>

          <div>
            <h3>45g</h3>
            <p>CARBS</p>
          </div>

          <div>
            <h3>V</h3>
            <p>VEGAN</p>
          </div>
        </div>
      </div>
    </div>
    
  </body>
</html>
